# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG (SUPABASE - POSTGRES)
# ===============================
spring.datasource.url=jdbc:postgresql://db.xgfnueeriplpqlfmyfyr.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${)AeQ7VFs^Yy3nfZ}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Fix common PostgreSQL issue
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================
# CONNECTION POOL (HIKARI - DEFAULT)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# ===============================
# LOGGING
# ===============================
logging.level.org.example.cat=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ===============================
# ERROR HANDLING
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always

# ===============================
# CORS (IF FRONTEND CONNECTING)
# ===============================
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allowed-headers=*